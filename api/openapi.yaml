openapi: "3.0.3"
info:
  title: BasketForm-AI API
  description: REST API for basketball shooting form analysis platform
  version: "0.1.0"
  contact:
    name: BasketForm-AI Team
    url: https://github.com/kr1ny77/BasketForm-AI

servers:
  - url: http://80.74.30.14/api
    description: MVP v0 Production

paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      tags:
        - System
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/signup:
    post:
      summary: Create a new user account
      operationId: signup
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      summary: Authenticate user and obtain JWT token
      operationId: login
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      summary: Get current user profile
      operationId: getMe
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /videos/upload:
    post:
      summary: Upload a basketball shooting video
      operationId: uploadVideo
      tags:
        - Videos
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Video file (MP4, MOV, AVI; max 50MB)
              required:
                - file
      responses:
        "201":
          description: Video uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoUploadResponse"
        "400":
          description: Invalid file type or size
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /videos/{id}/analysis:
    get:
      summary: Get biomechanical analysis for a video
      operationId: getAnalysis
      tags:
        - Analysis
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Video ID
      responses:
        "200":
          description: Analysis results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResponse"
        "404":
          description: Analysis not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy
        version:
          type: string
          example: "0.1.0"

    SignupRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          example: "{{password}}"

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: "{{password}}"

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          example: "{{access_token}}"
        user:
          $ref: "#/components/schemas/UserProfile"

    UserProfile:
      type: object
      properties:
        id:
          type: string
          example: user_abc123
        email:
          type: string
          example: user@example.com
        created_at:
          type: string
          format: date-time

    VideoUploadResponse:
      type: object
      properties:
        id:
          type: string
          example: video_abc123
        filename:
          type: string
          example: shot_video.mp4
        status:
          type: string
          enum:
            - uploaded
            - processing
            - completed
            - failed
        created_at:
          type: string
          format: date-time

    AnalysisResponse:
      type: object
      properties:
        video_id:
          type: string
          example: video_abc123
        status:
          type: string
          enum:
            - processing
            - completed
            - failed
        scores:
          type: object
          properties:
            stance:
              type: integer
              minimum: 0
              maximum: 100
              example: 85
            arm_angle:
              type: integer
              minimum: 0
              maximum: 100
              example: 72
            release_point:
              type: integer
              minimum: 0
              maximum: 100
              example: 90
            follow_through:
              type: integer
              minimum: 0
              maximum: 100
              example: 78
        keypoints:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              x:
                type: number
              y:
                type: number
        feedback:
          type: object
          properties:
            brief:
              type: string
              example: Good release point. Adjust elbow alignment.
            detailed:
              type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: not_found
        message:
          type: string
          example: Resource not found
