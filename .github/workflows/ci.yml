name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      GONOSUMCHECK: github.com/kr1ny77/BasketForm-AI
      GONOSUMDB: github.com/kr1ny77/BasketForm-AI
      GOFLAGS: -mod=mod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests
        run: go test -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      GONOSUMCHECK: github.com/kr1ny77/BasketForm-AI
      GONOSUMDB: github.com/kr1ny77/BasketForm-AI
      GOFLAGS: -mod=mod
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: go build -o bin/server ./cmd/server/
