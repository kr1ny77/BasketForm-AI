name: Lychee Link Checking

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Lychee
        uses: lycheeverse/lychee-action@v1

      - name: Run Lychee
        with:
          args: >
            --verbose
            --no-progress
            --exclude-loop
            --exclude 'localhost'
            --exclude '127.0.0.1'
            --exclude 'example.com'
            --exclude 'youtu.be/PLACEHOLDER'
            --exclude 'figma.com/proto/PLACEHOLDER'
            --exclude '/api/health'
            --exclude '/api/db-status'
            --exclude '/api/storage-status'
            --accept 200,204,301,302
            --timeout 30
            --max-retries 3
            --max-redirects 10
            './**/*.md'
          fail: true

      - name: Upload Lychee Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: lychee-report
          path: ./lychee/out.md
          retention-days: 30