{{define "title"}}Progress{{end}}

{{define "content"}}
<section class="page-header">
    <h1>Processing Progress</h1>
    <p id="progressStatus">Waiting for video ID\u2026</p>
</section>
<section class="progress-card">
    <div class="progress-bar large">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <p class="progress-pct" id="progressPct">0%</p>
    <div id="resultLink" style="display:none; margin-top:1.5rem;">
        <a href="#" class="btn" id="viewResultBtn">View Results</a>
    </div>
    <div id="errorHint" style="display:none; margin-top:1.5rem; color:var(--text-dim); font-size:0.88rem;">
        Something went wrong during processing.
    </div>
</section>
{{end}}

{{define "scripts"}}
<script>
var params = new URLSearchParams(window.location.search);
var videoId = params.get('id');
var statusEl = document.getElementById('progressStatus');
var fillEl = document.getElementById('progressFill');
var pctEl = document.getElementById('progressPct');
var linkEl = document.getElementById('resultLink');
var btnEl = document.getElementById('viewResultBtn');
var errEl = document.getElementById('errorHint');

if (!videoId) {
    statusEl.textContent = 'No video ID provided. Go to Upload to start.';
} else {
    statusEl.textContent = 'Analyzing video\u2026';
    pollStatus();
}

function pollStatus() {
    fetch('/api/status/' + videoId)
        .then(function (r) { return r.json(); })
        .then(function (data) {
            fillEl.style.width = data.progress + '%';
            pctEl.textContent = data.progress + '%';
            if (data.status === 'done') {
                statusEl.textContent = 'Analysis complete!';
                pctEl.textContent = '100%';
                btnEl.href = '/results?id=' + videoId;
                linkEl.style.display = 'inline-flex';
            } else if (data.status === 'error') {
                statusEl.textContent = 'Processing failed.';
                errEl.style.display = 'block';
            } else {
                statusEl.textContent = 'Status: ' + data.status + '\u2026';
                setTimeout(pollStatus, 1000);
            }
        })
        .catch(function () {
            statusEl.textContent = 'Cannot reach server. Retrying\u2026';
            setTimeout(pollStatus, 3000);
        });
}
</script>
{{end}}
