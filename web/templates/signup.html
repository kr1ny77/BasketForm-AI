<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — BasketForm-AI</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2">
    <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
</head>
<body class="auth-page">
    <canvas id="bgCanvas"></canvas>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>BasketForm-AI</h1>
                <p>Create your account</p>
            </div>
            <form id="signupForm">
                <div class="form-group">
                    <label for="nickname">Nickname</label>
                    <input type="text" id="nickname" placeholder="Choose a unique nickname" required minlength="3">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="At least 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="passwordConfirm">Confirm Password</label>
                    <input type="password" id="passwordConfirm" placeholder="Repeat your password" required>
                </div>
                <div id="errorMessage" class="error-message" style="display:none;"></div>
                <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="/login">Sign In</a></p>
            </div>
        </div>
    </div>
    <script src="/static/js/canvas.js"></script>
    <script>
    document.getElementById('signupForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var nickname = document.getElementById('nickname').value.trim();
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;
        var passwordConfirm = document.getElementById('passwordConfirm').value;
        var errorEl = document.getElementById('errorMessage');
        errorEl.style.display = 'none';

        if (password !== passwordConfirm) {
            errorEl.textContent = 'Passwords do not match.';
            errorEl.style.display = 'block';
            return;
        }
        if (password.length < 6) {
            errorEl.textContent = 'Password must be at least 6 characters.';
            errorEl.style.display = 'block';
            return;
        }
        if (nickname.length < 3) {
            errorEl.textContent = 'Nickname must be at least 3 characters.';
            errorEl.style.display = 'block';
            return;
        }

        fetch('/api/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({nickname: nickname, email: email, password: password})
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) {
                errorEl.textContent = data.error;
                errorEl.style.display = 'block';
            } else {
                window.location.href = '/login';
            }
        })
        .catch(function() {
            errorEl.textContent = 'Connection error. Please try again.';
            errorEl.style.display = 'block';
        });
    });
    </script>
</body>
</html>
