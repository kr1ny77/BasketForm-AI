<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — BasketForm-AI</title>
    <link rel="stylesheet" href="/static/css/style.css?v=5">
    <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
    <script src="/static/js/i18n.js?v=5"></script>
</head>
<body class="auth-page">
    <canvas id="bgCanvas"></canvas>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>BasketForm-AI</h1>
                <p data-i18n="signup_subtitle">Create your account</p>
            </div>
            <form id="signupForm">
                <div class="form-group">
                    <label for="nickname" data-i18n="signup_nickname">Nickname</label>
                    <input type="text" id="nickname" data-i18n-placeholder="signup_nickname_ph" placeholder="Choose a unique nickname" required minlength="3">
                </div>
                <div class="form-group">
                    <label for="email" data-i18n="signup_email">Email</label>
                    <input type="email" id="email" data-i18n-placeholder="signup_email_ph" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password" data-i18n="signup_password">Password</label>
                    <input type="password" id="password" data-i18n-placeholder="signup_password_ph" placeholder="At least 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="passwordConfirm" data-i18n="signup_confirm">Confirm Password</label>
                    <input type="password" id="passwordConfirm" data-i18n-placeholder="signup_confirm_ph" placeholder="Repeat your password" required>
                </div>
                <div id="errorMessage" class="error-message" style="display:none;"></div>
                <button type="submit" class="btn btn-primary btn-block" data-i18n="signup_btn">Sign Up</button>
            </form>
            <div class="auth-footer">
                <p><span data-i18n="signup_has_account">Already have an account?</span> <a href="/login" data-i18n="signup_login_link">Sign In</a></p>
            </div>
        </div>
    </div>
    <script src="/static/js/canvas.js"></script>
    <script>
    document.getElementById('signupForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var nickname = document.getElementById('nickname').value.trim();
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;
        var passwordConfirm = document.getElementById('passwordConfirm').value;
        var errorEl = document.getElementById('errorMessage');
        errorEl.style.display = 'none';
        var t = translations[window.getLang ? window.getLang() : 'en'] || translations.en;

        if (password !== passwordConfirm) {
            errorEl.textContent = t.signup_mismatch || 'Passwords do not match.';
            errorEl.style.display = 'block';
            return;
        }
        if (password.length < 6) {
            errorEl.textContent = t.signup_short || 'Password must be at least 6 characters.';
            errorEl.style.display = 'block';
            return;
        }
        if (nickname.length < 3) {
            errorEl.textContent = t.signup_nick_short || 'Nickname must be at least 3 characters.';
            errorEl.style.display = 'block';
            return;
        }

        fetch('/api/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({nickname: nickname, email: email, password: password})
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) {
                errorEl.textContent = data.error;
                errorEl.style.display = 'block';
            } else {
                window.location.href = '/login';
            }
        })
        .catch(function() {
            errorEl.textContent = t.login_error || 'Connection error. Please try again.';
            errorEl.style.display = 'block';
        });
    });
    </script>
</body>
</html>
