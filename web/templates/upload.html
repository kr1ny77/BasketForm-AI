<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload — BasketForm-AI</title>
    <link rel="stylesheet" href="/static/css/style.css?v=5">
    <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-left">
            <a href="/" class="logo">BasketForm-AI</a>
        </div>
        <div class="nav-center">
            <ul class="nav-links">
                <li><a href="/upload" class="active" data-i18n="nav_upload">Upload</a></li>
                <li><a href="/results" data-i18n="nav_results">Results</a></li>
                <li><a href="/progress" data-i18n="nav_progress">Progress</a></li>
                <li><a href="/export" data-i18n="nav_export">Export</a></li>
                <li><a href="/shared" data-i18n="nav_shared">Shared</a></li>
                <li><a href="/friends" data-i18n="nav_friends">Friends</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <select id="langSelect" class="lang-select" onchange="applyLang(this.value)">
                <option value="en">EN</option>
                <option value="ru">RU</option>
            </select>
            <a href="/profile" class="nav-profile" data-i18n="nav_profile">Profile</a>
        </div>
    </nav>
    <main class="content">
        <section class="page-header">
            <h1 data-i18n="upload_title">Upload Video</h1>
            <p data-i18n="upload_desc">Upload a basketball shooting video for analysis</p>
        </section>
        <section class="upload-area">
            <div class="dropzone" id="dropzone">
                <div class="dropzone-content">
                    <span class="dropzone-icon">&#127936;</span>
                    <p data-i18n="upload_drag">Drag &amp; drop your video here</p>
                    <p class="dropzone-hint" data-i18n="upload_hint">or click to browse · MP4, MOV, AVI · max 100 MB</p>
                    <p class="dropzone-file-name" id="fileName"></p>
                    <input type="file" id="fileInput" accept="video/*,.mp4,.mov,.avi,.MP4,.MOV,.AVI" hidden>
                </div>
            </div>
            <div class="upload-status" id="uploadStatus" style="display:none;">
                <div class="progress-bar large">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p id="uploadMessage" data-i18n="upload_msg">Uploading...</p>
            </div>
        </section>
    </main>
    <script src="/static/js/i18n.js?v=5"></script>
    <script src="/static/js/canvas.js"></script>
    <script>
    var dropzone = document.getElementById('dropzone');
    var fileInput = document.getElementById('fileInput');
    var uploadStatus = document.getElementById('uploadStatus');
    var progressFill = document.getElementById('progressFill');
    var uploadMessage = document.getElementById('uploadMessage');
    var fileNameEl = document.getElementById('fileName');

    dropzone.addEventListener('click', function () { fileInput.click(); });
    dropzone.addEventListener('dragover', function (e) { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', function () { dropzone.classList.remove('dragover'); });
    dropzone.addEventListener('drop', function (e) {
        e.preventDefault();
        dropzone.classList.remove('dragover');
        if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', function () {
        if (fileInput.files.length) handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
        var ext = file.name.split('.').pop().toLowerCase();
        var allowedExt = ['mp4', 'mov', 'avi'];
        if (allowedExt.indexOf(ext) === -1) {
            alert('Unsupported format. Use MP4, MOV, or AVI.');
            return;
        }
        if (file.size > 100 * 1024 * 1024) {
            alert('File too large. Maximum size is 100 MB.');
            return;
        }
        fileNameEl.textContent = file.name + ' (' + (file.size / 1048576).toFixed(1) + ' MB)';
        uploadStatus.style.display = 'block';
        var formData = new FormData();
        formData.append('video', file);
        formData.append('lang', localStorage.getItem('lang') || 'en');
        var xhr = new XMLHttpRequest();
        xhr.upload.addEventListener('progress', function (e) {
            if (e.lengthComputable) {
                var pct = Math.round((e.loaded / e.total) * 100);
                progressFill.style.width = pct + '%';
                uploadMessage.textContent = 'Uploading\u2026 ' + pct + '%';
            }
        });
        xhr.addEventListener('load', function () {
            if (xhr.status === 201) {
                var data = JSON.parse(xhr.responseText);
                progressFill.style.width = '100%';
                uploadMessage.textContent = 'Upload complete! Redirecting\u2026';
                setTimeout(function () { window.location.href = '/progress?id=' + data.id; }, 800);
            } else {
                uploadMessage.textContent = 'Upload failed: ' + xhr.statusText;
            }
        });
        xhr.addEventListener('error', function () { uploadMessage.textContent = 'Upload failed.'; });
        xhr.open('POST', '/api/upload');
        xhr.send(formData);
    }
    </script>
</body>
</html>
