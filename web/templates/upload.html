{{define "title"}}Upload{{end}}

{{define "content"}}
<section class="page-header">
    <h1>Upload Video</h1>
    <p>Upload a basketball shooting video for analysis</p>
</section>
<section class="upload-area">
    <div class="dropzone" id="dropzone">
        <div class="dropzone-content">
            <span class="dropzone-icon">&#9917;</span>
            <p>Drag & drop your video here</p>
            <p class="dropzone-hint">or click to browse &middot; MP4, MOV, AVI &middot; max 100 MB</p>
            <p class="dropzone-file-name" id="fileName"></p>
            <input type="file" id="fileInput" accept="video/mp4,video/quicktime,video/x-msvideo" hidden>
        </div>
    </div>
    <div class="upload-status" id="uploadStatus" style="display:none;">
        <div class="progress-bar large">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <p id="uploadMessage">Uploading...</p>
    </div>
</section>
{{end}}

{{define "scripts"}}
<script>
var dropzone = document.getElementById('dropzone');
var fileInput = document.getElementById('fileInput');
var uploadStatus = document.getElementById('uploadStatus');
var progressFill = document.getElementById('progressFill');
var uploadMessage = document.getElementById('uploadMessage');
var fileNameEl = document.getElementById('fileName');

dropzone.addEventListener('click', function () { fileInput.click(); });
dropzone.addEventListener('dragover', function (e) { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', function () { dropzone.classList.remove('dragover'); });
dropzone.addEventListener('drop', function (e) {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', function () {
    if (fileInput.files.length) handleFile(fileInput.files[0]);
});

function handleFile(file) {
    var allowed = ['video/mp4', 'video/quicktime', 'video/x-msvideo'];
    if (allowed.indexOf(file.type) === -1) {
        alert('Unsupported format. Use MP4, MOV, or AVI.');
        return;
    }
    if (file.size > 100 * 1024 * 1024) {
        alert('File too large. Maximum size is 100 MB.');
        return;
    }
    fileNameEl.textContent = file.name + ' (' + (file.size / 1048576).toFixed(1) + ' MB)';
    uploadStatus.style.display = 'block';
    var formData = new FormData();
    formData.append('video', file);
    var xhr = new XMLHttpRequest();
    xhr.upload.addEventListener('progress', function (e) {
        if (e.lengthComputable) {
            var pct = Math.round((e.loaded / e.total) * 100);
            progressFill.style.width = pct + '%';
            uploadMessage.textContent = 'Uploading\u2026 ' + pct + '%';
        }
    });
    xhr.addEventListener('load', function () {
        if (xhr.status === 201) {
            var data = JSON.parse(xhr.responseText);
            progressFill.style.width = '100%';
            uploadMessage.textContent = 'Upload complete! Redirecting\u2026';
            setTimeout(function () { window.location.href = '/progress?id=' + data.id; }, 800);
        } else {
            uploadMessage.textContent = 'Upload failed: ' + xhr.statusText;
        }
    });
    xhr.addEventListener('error', function () { uploadMessage.textContent = 'Upload failed.'; });
    xhr.open('POST', '/api/upload');
    xhr.send(formData);
}
</script>
{{end}}
