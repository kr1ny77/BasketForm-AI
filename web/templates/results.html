{{define "title"}}Results{{end}}

{{define "content"}}
<section class="page-header">
    <h1>Analysis Results</h1>
    <p>View your shooting form analyses</p>
</section>
<section class="results-grid" id="resultsGrid">
    <p class="empty-state">No analyses yet. Upload a video to get started.</p>
</section>
{{end}}

{{define "scripts"}}
<script>
fetch('/api/videos')
    .then(r => r.json())
    .then(videos => {
        const grid = document.getElementById('resultsGrid');
        if (!videos.length) return;
        grid.innerHTML = '';
        videos.forEach(v => {
            const card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = '<h3>' + v.filename + '</h3>' +
                '<p>ID: ' + v.id + '</p>' +
                '<p>Status: <span class="status-' + v.status + '">' + v.status + '</span></p>' +
                '<p>' + new Date(v.created_at).toLocaleDateString() + '</p>' +
                '<a href="/progress?id=' + v.id + '" class="btn btn-sm">View</a>';
            grid.appendChild(card);
        });
    })
    .catch(() => {});
</script>
{{end}}
