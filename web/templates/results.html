<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results — BasketForm-AI</title>
    <link rel="stylesheet" href="/static/css/style.css?v=3">
    <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <nav class="navbar">
        <div class="navbar-left">
            <a href="/" class="logo">BasketForm-AI</a>
        </div>
        <div class="nav-center">
            <ul class="nav-links">
                <li><a href="/upload">Upload</a></li>
                <li><a href="/results" class="active">Results</a></li>
                <li><a href="/export">Export</a></li>
                <li><a href="/shared">Shared</a></li>
                <li><a href="/friends">Friends</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <select id="langSelect" class="lang-select" onchange="applyLang(this.value)">
                <option value="en">EN</option>
                <option value="ru">RU</option>
            </select>
            <a href="/profile" class="nav-profile">Profile</a>
        </div>
    </nav>
    <main class="content">
        <section class="page-header">
            <h1>Analysis Results</h1>
            <p>View your shooting form analyses</p>
        </section>
        <div class="filter-bar">
            <input type="text" id="filterName" placeholder="Filter by filename...">
            <select id="filterSort">
                <option value="date-desc">Newest first</option>
                <option value="date-asc">Oldest first</option>
                <option value="score-desc">Highest score</option>
                <option value="score-asc">Lowest score</option>
            </select>
        </div>
        <section class="results-grid" id="resultsGrid">
            <p class="empty-state"><span class="empty-icon">&#127936;</span><br>No analyses yet. Upload a video to get started.</p>
        </section>
    </main>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal modal-lg" id="modal">
            <button class="modal-close" id="modalClose">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>
    <div class="modal-overlay" id="shareOverlay">
        <div class="modal" id="shareModal" style="max-width:420px;">
            <button class="modal-close" id="shareClose">&times;</button>
            <h2>Share Result</h2>
            <div class="form-group">
                <label for="friendSelect">Select a friend</label>
                <select id="friendSelect" class="form-group select-input">
                    <option value="">Loading friends...</option>
                </select>
            </div>
            <div id="shareStatus" class="text-muted" style="margin-bottom:1rem;"></div>
            <button class="btn btn-primary btn-block" id="shareBtn">Send</button>
        </div>
    </div>
    <script>
    var allVideos = [];
    var grid = document.getElementById('resultsGrid');
    var filterName = document.getElementById('filterName');
    var filterSort = document.getElementById('filterSort');
    var currentResultId = null;

    fetch('/api/videos')
        .then(function (r) { return r.json(); })
        .then(function (videos) { allVideos = videos; renderList(); });

    filterName.addEventListener('input', renderList);
    filterSort.addEventListener('change', renderList);

    function renderList() {
        var q = filterName.value.toLowerCase();
        var list = allVideos.filter(function (v) {
            return !q || v.filename.toLowerCase().indexOf(q) !== -1;
        });
        var sort = filterSort.value;
        list.sort(function (a, b) {
            if (sort === 'date-asc') return new Date(a.created_at) - new Date(b.created_at);
            if (sort === 'score-desc') return (b.score || 0) - (a.score || 0);
            if (sort === 'score-asc') return (a.score || 0) - (b.score || 0);
            return new Date(b.created_at) - new Date(a.created_at);
        });
        if (!list.length) {
            grid.innerHTML = '<p class="empty-state"><span class="empty-icon">&#127936;</span><br>No results found.</p>';
            return;
        }
        grid.innerHTML = '';
        list.forEach(function (v) {
            var card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML =
                '<div>' +
                    '<h3>' + escHtml(v.filename) + '</h3>' +
                    '<div class="meta">' +
                        '<span>ID: ' + v.id.substring(0, 8) + '</span>' +
                        '<span>' + new Date(v.created_at).toLocaleDateString() + '</span>' +
                        '<span class="badge badge-' + v.status + '">' + v.status + '</span>' +
                    '</div>' +
                '</div>' +
                '<div class="score">' +
                    (v.score != null ? v.score + '<small>/ 100</small>' : '&mdash;') +
                '</div>';
            card.style.cursor = 'pointer';
            card.addEventListener('click', function () { openModal(v.id); });
            grid.appendChild(card);
        });
    }

    function escHtml(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function openModal(id) {
        currentResultId = id;
        fetch('/api/result/' + id)
            .then(function (r) { return r.json(); })
            .then(function (data) {
                var body = document.getElementById('modalBody');
                var html = '<h2>' + escHtml(data.filename || id) + '</h2>';

                if (data.output_video_url) {
                    html += '<div class="video-section">' +
                        '<video controls class="result-video" src="' + data.output_video_url + '"></video>' +
                    '</div>';
                }

                html += '<div class="detail-grid">' +
                    '<div class="detail-item"><label>Score</label><span>' + (data.score != null ? data.score + ' / 100' : 'N/A') + '</span></div>' +
                    '<div class="detail-item"><label>Video ID</label><span>' + id + '</span></div>' +
                    '<div class="detail-item"><label>Date</label><span>' + new Date(data.created_at || Date.now()).toLocaleString() + '</span></div>' +
                    '<div class="detail-item"><label>Status</label><span class="badge badge-done">done</span></div>' +
                '</div>';

                if (data.phases && data.phases.length > 0) {
                    html += '<div class="phases-section"><h3>Phase Analysis</h3><div class="phases-grid">';
                    data.phases.forEach(function (p) {
                        var color = p.score >= 80 ? 'var(--success)' : p.score >= 50 ? 'var(--warning)' : 'var(--danger)';
                        html += '<div class="phase-card">' +
                            '<div class="phase-header">' +
                                '<span class="phase-name">' + escHtml(p.phase_name) + '</span>' +
                                '<span class="phase-score" style="color:' + color + '">' + Math.round(p.score) + '/100</span>' +
                            '</div>' +
                            '<div class="phase-bar"><div class="phase-fill" style="width:' + p.score + '%;background:' + color + '"></div></div>' +
                            '<p class="phase-feedback">' + escHtml(p.feedback || '') + '</p>' +
                        '</div>';
                    });
                    html += '</div></div>';
                }

                var summary = (data.feedback || 'No feedback available.').split('\n')[0];
                html += '<div class="feedback-section">' +
                    '<strong>Analysis Report</strong>' +
                    '<p class="feedback-summary">' + escHtml(summary) + '</p>' +
                    '<pre class="feedback-text feedback-hidden" id="feedbackFull">' + escHtml(data.feedback || '') + '</pre>' +
                    '<button class="btn btn-sm feedback-toggle" id="feedbackToggle" onclick="toggleFeedback()">&#9660; Show detailed analysis</button>' +
                '</div>';

                html += '<div class="chart-container"><canvas id="scoreChart" height="200"></canvas></div>';

                html += '<div class="modal-actions">' +
                    '<button class="btn btn-primary" onclick="openShareModal()">&#128279; Share</button>' +
                    '<button class="btn btn-outline" onclick="exportPDF()">&#128196; Export PDF</button>' +
                '</div>';

                body.innerHTML = html;
                document.getElementById('modalOverlay').classList.add('active');
                drawScoreChart(data);
            })
            .catch(function () { alert('Could not load results.'); });
    }

    function toggleFeedback() {
        var full = document.getElementById('feedbackFull');
        var btn = document.getElementById('feedbackToggle');
        if (full.classList.contains('feedback-hidden')) {
            full.classList.remove('feedback-hidden');
            btn.innerHTML = '&#9650; Hide detailed analysis';
        } else {
            full.classList.add('feedback-hidden');
            btn.innerHTML = '&#9660; Show detailed analysis';
        }
    }

    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', function (e) {
        if (e.target === this) closeModal();
    });
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeModal(); });

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('active');
    }

    function drawScoreChart(data) {
        var canvas = document.getElementById('scoreChart');
        if (!canvas || typeof Chart === 'undefined') return;
        var labels = ['Stance', 'Arm Angle', 'Release', 'Follow-through'];
        var values = data.scores || [0, 0, 0, 0];
        new Chart(canvas, {
            type: 'radar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Score Breakdown',
                    data: values,
                    backgroundColor: 'rgba(255,106,0,0.15)',
                    borderColor: '#ff6a00',
                    pointBackgroundColor: '#ff6a00',
                    borderWidth: 2
                }]
            },
            options: {
                scales: { r: { beginAtZero: true, max: 100, ticks: { color: '#888', backdropColor: 'transparent' }, grid: { color: 'rgba(255,255,255,0.06)' }, pointLabels: { color: '#ccc' } } },
                plugins: { legend: { display: false } }
            }
        });
    }

    // --- Share ---
    function openShareModal() {
        document.getElementById('shareOverlay').classList.add('active');
        document.getElementById('shareStatus').textContent = '';
        document.getElementById('shareBtn').disabled = false;
        loadFriendsList();
    }

    document.getElementById('shareClose').addEventListener('click', function () {
        document.getElementById('shareOverlay').classList.remove('active');
    });
    document.getElementById('shareOverlay').addEventListener('click', function (e) {
        if (e.target === this) this.classList.remove('active');
    });

    function loadFriendsList() {
        var sel = document.getElementById('friendSelect');
        sel.innerHTML = '<option value="">Loading...</option>';
        fetch('/api/friends')
            .then(function (r) { return r.json(); })
            .then(function (friends) {
                if (!friends || friends.length === 0) {
                    sel.innerHTML = '<option value="">No friends yet</option>';
                    return;
                }
                sel.innerHTML = '<option value="">-- Select friend --</option>';
                friends.forEach(function (f) {
                    var opt = document.createElement('option');
                    opt.value = f.id;
                    opt.textContent = f.nickname;
                    sel.appendChild(opt);
                });
            });
    }

    document.getElementById('shareBtn').addEventListener('click', function () {
        var friendId = document.getElementById('friendSelect').value;
        var status = document.getElementById('shareStatus');
        if (!friendId) {
            status.textContent = 'Please select a friend.';
            status.style.color = 'var(--danger)';
            return;
        }
        fetch('/api/share/result', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ result_id: currentResultId, friend_id: friendId })
        })
        .then(function (r) { return r.json(); })
        .then(function (data) {
            if (data.error) {
                status.textContent = data.error;
                status.style.color = 'var(--danger)';
            } else {
                status.textContent = 'Result shared successfully!';
                status.style.color = 'var(--success)';
                document.getElementById('shareBtn').disabled = true;
            }
        });
    });

    // --- PDF Export ---
    function exportPDF() {
        if (typeof window.jspdf === 'undefined') {
            alert('PDF library is loading, please try again.');
            return;
        }
        var jsPDF = window.jspdf.jsPDF;
        var doc = new jsPDF();
        var margin = 15;
        var y = margin;
        var lineHeight = 7;
        var pageW = doc.internal.pageSize.getWidth();

        doc.setFont('helvetica', 'bold');
        doc.setFontSize(18);
        doc.setTextColor(255, 106, 0);
        doc.text('BasketForm-AI Analysis Report', margin, y);
        y += lineHeight + 5;

        doc.setFont('helvetica', 'normal');
        doc.setFontSize(10);
        doc.setTextColor(100, 100, 100);
        doc.text('Generated: ' + new Date().toLocaleString(), margin, y);
        y += lineHeight + 5;

        doc.setDrawColor(255, 106, 0);
        doc.setLineWidth(0.5);
        doc.line(margin, y, pageW - margin, y);
        y += lineHeight + 3;

        doc.setFont('helvetica', 'bold');
        doc.setFontSize(12);
        doc.setTextColor(30, 30, 30);

        var body = document.getElementById('modalBody');
        if (!body) return;

        var scoreEl = body.querySelector('.detail-item span');
        var allDetailItems = body.querySelectorAll('.detail-item');
        var filename = '';
        var score = '';
        var videoId = '';
        var date = '';
        allDetailItems.forEach(function (item) {
            var label = item.querySelector('label');
            var span = item.querySelector('span');
            if (label && span) {
                var lbl = label.textContent.trim();
                var val = span.textContent.trim();
                if (lbl === 'Score') score = val;
                if (lbl === 'Video ID') videoId = val;
                if (lbl === 'Date') date = val;
            }
        });

        var h2 = body.querySelector('h2');
        if (h2) filename = h2.textContent.trim();

        doc.setFontSize(13);
        doc.setFont('helvetica', 'bold');
        doc.text('Video: ' + filename, margin, y);
        y += lineHeight;

        doc.setFont('helvetica', 'normal');
        doc.setFontSize(10);
        doc.setTextColor(60, 60, 60);
        doc.text('Score: ' + score, margin, y); y += lineHeight;
        doc.text('Date: ' + date, margin, y); y += lineHeight;
        doc.text('Video ID: ' + videoId, margin, y);
        y += lineHeight + 5;

        var phasesSection = body.querySelector('.phases-section');
        if (phasesSection) {
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(12);
            doc.setTextColor(30, 30, 30);
            doc.text('Phase Analysis', margin, y);
            y += lineHeight + 2;

            var phaseCards = body.querySelectorAll('.phase-card');
            phaseCards.forEach(function (card) {
                if (y > 260) { doc.addPage(); y = margin; }
                var name = card.querySelector('.phase-name');
                var score = card.querySelector('.phase-score');
                var fb = card.querySelector('.phase-feedback');
                if (name) {
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(10);
                    doc.setTextColor(30, 30, 30);
                    doc.text(name.textContent.trim() + ': ' + (score ? score.textContent.trim() : ''), margin, y);
                    y += lineHeight - 1;
                }
                if (fb) {
                    doc.setFont('helvetica', 'normal');
                    doc.setFontSize(9);
                    doc.setTextColor(80, 80, 80);
                    var lines = doc.splitTextToSize(fb.textContent.trim(), pageW - 2 * margin);
                    lines.forEach(function (line) {
                        if (y > 275) { doc.addPage(); y = margin; }
                        doc.text(line, margin, y);
                        y += 5;
                    });
                }
                y += 3;
            });
        }

        y += 3;
        if (y > 250) { doc.addPage(); y = margin; }
        doc.setDrawColor(255, 106, 0);
        doc.line(margin, y, pageW - margin, y);
        y += lineHeight + 3;

        doc.setFont('helvetica', 'bold');
        doc.setFontSize(12);
        doc.setTextColor(30, 30, 30);
        doc.text('Full Feedback', margin, y);
        y += lineHeight;

        var feedbackFull = document.getElementById('feedbackFull');
        if (feedbackFull) {
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(9);
            doc.setTextColor(60, 60, 60);
            var fbLines = doc.splitTextToSize(feedbackFull.textContent.trim(), pageW - 2 * margin);
            fbLines.forEach(function (line) {
                if (y > 275) { doc.addPage(); y = margin; }
                doc.text(line, margin, y);
                y += 5;
            });
        }

        doc.save('BasketForm-AI-' + (filename || 'report').replace(/[^a-zA-Z0-9]/g, '_') + '.pdf');
    }
    </script>
    <script src="/static/js/canvas.js"></script>
</body>
</html>
