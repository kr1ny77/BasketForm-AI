<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — BasketForm-AI</title>
    <link rel="stylesheet" href="/static/css/style.css?v=5">
    <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
    <script src="/static/js/i18n.js?v=5"></script>
</head>
<body class="auth-page">
    <canvas id="bgCanvas"></canvas>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>BasketForm-AI</h1>
                <p data-i18n="login_subtitle">Sign in to your account</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email" data-i18n="login_email">Email</label>
                    <input type="email" id="email" data-i18n-placeholder="login_email_ph" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password" data-i18n="login_password">Password</label>
                    <input type="password" id="password" data-i18n-placeholder="login_password_ph" placeholder="Enter your password" required>
                </div>
                <div id="errorMessage" class="error-message" style="display:none;"></div>
                <button type="submit" class="btn btn-primary btn-block" data-i18n="login_btn">Sign In</button>
            </form>
            <div class="auth-footer">
                <p><span data-i18n="login_no_account">Don't have an account?</span> <a href="/register" data-i18n="login_signup_link">Sign Up</a></p>
            </div>
        </div>
    </div>
    <script src="/static/js/canvas.js"></script>
    <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var email = document.getElementById('email').value;
        var password = document.getElementById('password').value;
        var errorEl = document.getElementById('errorMessage');
        errorEl.style.display = 'none';
        var t = translations[window.getLang ? window.getLang() : 'en'] || translations.en;

        fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email: email, password: password})
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) {
                errorEl.textContent = data.error;
                errorEl.style.display = 'block';
            } else {
                window.location.href = '/upload';
            }
        })
        .catch(function() {
            errorEl.textContent = t.login_error || 'Connection error. Please try again.';
            errorEl.style.display = 'block';
        });
    });
    </script>
</body>
</html>
