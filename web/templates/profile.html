<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — BasketForm-AI</title>
    <link rel="stylesheet" href="/static/css/style.css?v=4">
    <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <nav class="navbar">
        <div class="navbar-left">
            <a href="/" class="logo">BasketForm-AI</a>
        </div>
        <div class="nav-center">
            <ul class="nav-links">
                <li><a href="/upload">Upload</a></li>
                <li><a href="/results">Results</a></li>
                <li><a href="/progress">Progress</a></li>
                <li><a href="/export">Export</a></li>
                <li><a href="/shared">Shared</a></li>
                <li><a href="/friends">Friends</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <select id="langSelect" class="lang-select" onchange="applyLang(this.value)">
                <option value="en">EN</option>
                <option value="ru">RU</option>
            </select>
            <a href="/profile" class="nav-profile active">Profile</a>
        </div>
    </nav>
    <main class="content">
        <section class="page-header">
            <h1>Profile</h1>
            <p>Manage your account settings</p>
        </section>
        <section class="form-card">
            <div id="profileInfo" class="profile-info">
                <div class="form-group">
                    <label>Nickname</label>
                    <p id="nickname" class="profile-value">Loading...</p>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <p id="email" class="profile-value">Loading...</p>
                </div>
            </div>
        </section>
        <section class="form-card">
            <h2>Change Password</h2>
            <form id="passwordForm">
                <div class="form-group">
                    <label for="oldPassword">Current Password</label>
                    <input type="password" id="oldPassword" placeholder="Enter current password" required>
                </div>
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" placeholder="At least 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat new password" required>
                </div>
                <div id="errorMessage" class="error-message" style="display:none;"></div>
                <div id="successMessage" class="success-message" style="display:none;"></div>
                <button type="submit" class="btn btn-primary">Update Password</button>
            </form>
        </section>
        <section class="form-card">
            <button id="logoutBtn" class="btn btn-danger" data-i18n="profile_logout">Logout</button>
        </section>
    </main>
    <script>
    fetch('/api/profile')
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.error) { window.location.href = '/login'; return; }
        document.getElementById('nickname').textContent = data.nickname;
        document.getElementById('email').textContent = data.email;
    });

    document.getElementById('passwordForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var oldPw = document.getElementById('oldPassword').value;
        var newPw = document.getElementById('newPassword').value;
        var confirmPw = document.getElementById('confirmPassword').value;
        var errorEl = document.getElementById('errorMessage');
        var successEl = document.getElementById('successMessage');
        errorEl.style.display = 'none';
        successEl.style.display = 'none';

        if (newPw !== confirmPw) {
            errorEl.textContent = 'Passwords do not match.';
            errorEl.style.display = 'block';
            return;
        }
        if (newPw.length < 6) {
            errorEl.textContent = 'Password must be at least 6 characters.';
            errorEl.style.display = 'block';
            return;
        }

        fetch('/api/profile/update', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({old_password: oldPw, new_password: newPw})
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) {
                errorEl.textContent = data.error;
                errorEl.style.display = 'block';
            } else {
                successEl.textContent = 'Password updated successfully!';
                successEl.style.display = 'block';
                document.getElementById('passwordForm').reset();
            }
        });
    });

    document.getElementById('logoutBtn').addEventListener('click', function() {
        document.cookie = 'token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
        window.location.href = '/login';
    });
    </script>
    <script src="/static/js/canvas.js"></script>
</body>
</html>
