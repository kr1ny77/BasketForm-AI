{{define "title"}}Profile{{end}}

{{define "content"}}
<section class="page-header">
    <h1>Profile</h1>
    <p>Manage your account settings</p>
</section>
<section class="form-card">
    <form id="profileForm" onsubmit="return false;">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" value="Player" placeholder="Your name">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" value="player@example.com" placeholder="Your email">
        </div>
        <div class="form-group">
            <label for="password">New Password</label>
            <input type="password" id="password" placeholder="Leave blank to keep current">
        </div>
        <div class="form-group">
            <label for="passwordConfirm">Confirm New Password</label>
            <input type="password" id="passwordConfirm" placeholder="Repeat new password">
        </div>
        <button type="button" class="btn" id="saveBtn">Save Changes</button>
    </form>
</section>
{{end}}

{{define "scripts"}}
<script>
document.getElementById('saveBtn').addEventListener('click', function () {
    var pw = document.getElementById('password').value;
    var pw2 = document.getElementById('passwordConfirm').value;
    if (pw && pw !== pw2) {
        alert('Passwords do not match.');
        return;
    }
    alert('Profile saved (demo).');
});
</script>
{{end}}
