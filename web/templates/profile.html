{{define "title"}}Profile{{end}}

{{define "content"}}
<section class="page-header">
    <h1>Profile</h1>
    <p>Manage your account settings</p>
</section>
<section class="form-card">
    <form id="profileForm" onsubmit="return false;">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" value="Player" placeholder="Your name">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" value="player@example.com" placeholder="Your email">
        </div>
        <div class="form-group">
            <label for="password">New Password</label>
            <input type="password" id="password" placeholder="Leave blank to keep current">
        </div>
        <button type="submit" class="btn" onclick="alert('Profile saved (demo)')">Save Changes</button>
    </form>
</section>
{{end}}

{{define "scripts"}}{{end}}
